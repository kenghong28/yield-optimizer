# Production environment values
# Override values for production deployment

monitor:
  image:
    tag: "latest"
    pullPolicy: IfNotPresent
    
  replicaCount: 3
  
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi
      
  env:
    LOG_LEVEL: "info"
    POSITION_CHECK_INTERVAL: "30s"
    PRICE_UPDATE_INTERVAL: "5s"
    MAX_CONCURRENT_CHECKS: "20"
    WORKER_COUNT: "10"
    
  secretEnv:
    # Production secrets - MUST be provided via external secret management
    DATABASE_URL: ""  # Set via --set or external secret
    REDIS_URL: "redis://yield-optimizer-redis:6379"
    POSITION_MANAGER_ADDRESS: ""  # Set with real contract address
    VAULT_ADDRESSES: ""  # Set with real vault addresses
    
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

redis:
  enabled: true
  persistence:
    enabled: true  # Enable persistence for production (price cache, etc.)
    size: 5Gi
    
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi

# Database: External Supabase (no PVC needed)
postgresql:
  enabled: false  # Always false - using external Supabase
  external:
    enabled: true
    provider: "supabase"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: yield-optimizer.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
          service:
            name: monitor
            port: 8080
  tls:
    - secretName: yield-optimizer-tls
      hosts:
        - yield-optimizer.yourdomain.com

# Security settings for production
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  fsGroup: 10001

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 10001