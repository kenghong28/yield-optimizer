apiVersion: v1
kind: Namespace
metadata:
  name: yield-optimizer
  labels:
    name: yield-optimizer
    app.kubernetes.io/name: yield-optimizer
    app.kubernetes.io/component: namespace
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: yield-optimizer-quota
  namespace: yield-optimizer
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "10"
    pods: "10"
    services: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: yield-optimizer-limits
  namespace: yield-optimizer
spec:
  limits:
  - default:
      cpu: "1"
      memory: "1Gi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    type: Container